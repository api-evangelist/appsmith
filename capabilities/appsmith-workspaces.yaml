naftiko: 1.0.0-alpha2
info:
  label: Appsmith API — Workspaces
  description: 'Appsmith API — Workspaces. 1 operations. Lead operation: Appsmith - List Workspaces. Self-contained Naftiko
    capability covering one Appsmith business surface.'
  tags:
  - Appsmith
  - Workspaces
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APPSMITH_API_KEY: APPSMITH_API_KEY
capability:
  consumes:
  - type: http
    namespace: appsmith-workspaces
    baseUri: https://app.appsmith.com/api/v1
    description: Appsmith API — Workspaces business capability. Self-contained, no shared references.
    resources:
    - name: workspaces
      path: /workspaces
      operations:
      - name: listworkspaces
        method: GET
        description: Appsmith - List Workspaces
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.APPSMITH_API_KEY}}'
  exposes:
  - type: rest
    namespace: appsmith-workspaces-rest
    port: 8080
    description: REST adapter for Appsmith API — Workspaces. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/workspaces
      name: workspaces
      description: REST surface for workspaces.
      operations:
      - method: GET
        name: listworkspaces
        description: Appsmith - List Workspaces
        call: appsmith-workspaces.listworkspaces
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: appsmith-workspaces-mcp
    port: 9090
    transport: http
    description: MCP adapter for Appsmith API — Workspaces. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: appsmith-list-workspaces
      description: Appsmith - List Workspaces
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: appsmith-workspaces.listworkspaces
      outputParameters:
      - type: object
        mapping: $.
