naftiko: 1.0.0-alpha2
info:
  label: HubSpot CRM admin panel built on Appsmith
  description: Drive a HubSpot internal tool from Appsmith - list applications, then read and write HubSpot contacts and deals through the CRM API for support / ops users.
  tags:
  - Appsmith
  - Integration
  - CRM
  - hubspot
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    APPSMITH_API_KEY: APPSMITH_API_KEY
    HUBSPOT_API_KEY: HUBSPOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: appsmith
    baseUri: https://app.appsmith.com/api
    description: Appsmith API operations consumed by this integration.
    resources:
    - name: applications
      path: /applications
      operations:
      - name: listapplications
        method: GET
        description: 'Appsmith: list HubSpot admin apps.'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: applications-applicationid
      path: /applications/{applicationId}
      operations:
      - name: getapplication
        method: GET
        description: 'Appsmith: fetch a HubSpot admin app for routing decisions.'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: applicationId
          in: path
          type: string
          description: Path parameter applicationId.
          required: true
  - type: http
    namespace: hubspot
    baseUri: https://api.hubapi.com
    description: HubSpot CRM API operations consumed by this integration.
    resources:
    - name: crm-v3-objects-contacts-contactid
      path: /crm/v3/objects/contacts/{contactId}
      operations:
      - name: getcontact
        method: GET
        description: 'HubSpot CRM API: getContact'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: contactId
          in: path
          type: string
          description: Path parameter contactId.
          required: true
    - name: crm-v3-objects-contacts-contactid
      path: /crm/v3/objects/contacts/{contactId}
      operations:
      - name: updatecontact
        method: PATCH
        description: 'HubSpot CRM API: updateContact'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: contactId
          in: path
          type: string
          description: Path parameter contactId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: appsmith-hubspot-mcp
    description: MCP adapter for the appsmith-hubspot integration.
    tools:
    - name: appsmith_hubspot
      description: Execute the appsmith hubspot integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: appsmith-hubspot-rest
    port: 8080
    description: REST adapter for the appsmith-hubspot integration.
    resources:
    - path: /appsmith-hubspot
      name: appsmith-hubspot
      description: REST surface for the appsmith-hubspot integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the appsmith-hubspot integration.
        call: appsmith_hubspot
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
