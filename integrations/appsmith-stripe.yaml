naftiko: 1.0.0-alpha2
info:
  label: Stripe billing admin panel in Appsmith
  description: Build an Appsmith internal tool that lets support staff look up Stripe customers and issue refunds, with the Appsmith app surface registered as a Naftiko capability.
  tags:
  - Appsmith
  - Integration
  - Billing
  - stripe
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    APPSMITH_API_KEY: APPSMITH_API_KEY
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: appsmith
    baseUri: https://app.appsmith.com/api
    description: Appsmith API operations consumed by this integration.
    resources:
    - name: applications
      path: /applications
      operations:
      - name: listapplications
        method: GET
        description: 'Appsmith: list billing admin-panel apps.'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: applications
      path: /applications
      operations:
      - name: createapplication
        method: POST
        description: 'Appsmith: provision a new Stripe billing admin app.'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: stripe
    baseUri: https://api.stripe.com
    description: Stripe API operations consumed by this integration.
    resources:
    - name: v1-customers-customer
      path: /v1/customers/{customer}
      operations:
      - name: getcustomer
        method: GET
        description: 'Stripe API: getCustomer'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customer
          in: path
          type: string
          description: Path parameter customer.
          required: true
    - name: v1-refunds
      path: /v1/refunds
      operations:
      - name: createrefund
        method: POST
        description: 'Stripe API: createRefund'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: appsmith-stripe-mcp
    description: MCP adapter for the appsmith-stripe integration.
    tools:
    - name: appsmith_stripe
      description: Execute the appsmith stripe integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: appsmith-stripe-rest
    port: 8080
    description: REST adapter for the appsmith-stripe integration.
    resources:
    - path: /appsmith-stripe
      name: appsmith-stripe
      description: REST surface for the appsmith-stripe integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the appsmith-stripe integration.
        call: appsmith_stripe
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
