naftiko: 1.0.0-alpha2
info:
  label: Wire an arbitrary REST API into Appsmith via Naftiko
  description: Use any third-party REST API as an Appsmith datasource - register the partner API, list Appsmith apps that consume it, and expose a unified MCP + REST surface for agents.
  tags:
  - Appsmith
  - Integration
  - Integration
  - rest-api
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    APPSMITH_API_KEY: APPSMITH_API_KEY
    REST_API_API_KEY: REST_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: appsmith
    baseUri: https://app.appsmith.com/api
    description: Appsmith API operations consumed by this integration.
    resources:
    - name: datasources
      path: /datasources
      operations:
      - name: listdatasources
        method: GET
        description: 'Appsmith: confirm the REST datasource is registered.'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: applications
      path: /applications
      operations:
      - name: listapplications
        method: GET
        description: 'Appsmith: list apps consuming the REST datasource.'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
  - type: http
    namespace: rest-api
    baseUri: https://api.example.com
    description: Generic REST API operations consumed by this integration.
    resources:
    - name: resource
      path: /{resource}
      operations:
      - name: getresource
        method: GET
        description: 'Generic REST API: getResource'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: resource
          in: path
          type: string
          description: Path parameter resource.
          required: true
    - name: resource
      path: /{resource}
      operations:
      - name: createresource
        method: POST
        description: 'Generic REST API: createResource'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: resource
          in: path
          type: string
          description: Path parameter resource.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: appsmith-rest-api-mcp
    description: MCP adapter for the appsmith-rest-api integration.
    tools:
    - name: appsmith_rest_api
      description: Execute the appsmith rest api integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: appsmith-rest-api-rest
    port: 8080
    description: REST adapter for the appsmith-rest-api integration.
    resources:
    - path: /appsmith-rest-api
      name: appsmith-rest-api
      description: REST surface for the appsmith-rest-api integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the appsmith-rest-api integration.
        call: appsmith_rest_api
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
