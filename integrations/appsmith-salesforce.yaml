naftiko: 1.0.0-alpha2
info:
  label: Build a Salesforce contact admin panel in Appsmith
  description: Stand up an Appsmith internal tool that reads and updates Salesforce Contacts, with Appsmith app metadata managed alongside the Salesforce REST calls.
  tags:
  - Appsmith
  - Integration
  - CRM
  - salesforce
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    APPSMITH_API_KEY: APPSMITH_API_KEY
    SALESFORCE_API_KEY: SALESFORCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: appsmith
    baseUri: https://app.appsmith.com/api
    description: Appsmith API operations consumed by this integration.
    resources:
    - name: applications
      path: /applications
      operations:
      - name: listapplications
        method: GET
        description: 'Appsmith: list Salesforce admin-panel apps.'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: applications
      path: /applications
      operations:
      - name: createapplication
        method: POST
        description: 'Appsmith: provision a new admin-panel app for a Salesforce workspace.'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: salesforce
    baseUri: https://yourinstance.my.salesforce.com
    description: Salesforce REST API operations consumed by this integration.
    resources:
    - name: services-data-v60-0-sobjects-contact-id
      path: /services/data/v60.0/sobjects/Contact/{id}
      operations:
      - name: getcontact
        method: GET
        description: 'Salesforce REST API: getContact'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
    - name: services-data-v60-0-sobjects-contact-id
      path: /services/data/v60.0/sobjects/Contact/{id}
      operations:
      - name: updatecontact
        method: PATCH
        description: 'Salesforce REST API: updateContact'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: appsmith-salesforce-mcp
    description: MCP adapter for the appsmith-salesforce integration.
    tools:
    - name: appsmith_salesforce
      description: Execute the appsmith salesforce integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: appsmith-salesforce-rest
    port: 8080
    description: REST adapter for the appsmith-salesforce integration.
    resources:
    - path: /appsmith-salesforce
      name: appsmith-salesforce
      description: REST surface for the appsmith-salesforce integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the appsmith-salesforce integration.
        call: appsmith_salesforce
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
